<h2 mat-dialog-title>
  Detalhes do acordo
</h2>

<mat-dialog-content>

  @if (agreement)
  {
    <div class="agreement-info">

      <p>
        <strong>Acordo:</strong>
        {{ agreement.number }}
      </p>

      <p>
        <strong>Contrato:</strong>
        {{ agreement.contractNumber }}
      </p>

      <p>
        <strong>Valor:</strong>
        {{ agreement.amount | currency:'BRL' }}
      </p>

    </div>

    <table
      mat-table
      [dataSource]="agreement.installments"
    >

      <ng-container matColumnDef="number">

        <th mat-header-cell *matHeaderCellDef>
          Parcela
        </th>

        <td mat-cell *matCellDef="let item">
          {{ item.number }}
        </td>

      </ng-container>

      <ng-container matColumnDef="dueDate">

        <th mat-header-cell *matHeaderCellDef>
          Vencimento
        </th>

        <td mat-cell *matCellDef="let item">
          {{ item.dueDate | date:'dd/MM/yyyy' }}
        </td>

      </ng-container>

      <ng-container matColumnDef="amount">

        <th mat-header-cell *matHeaderCellDef>
          Valor
        </th>

        <td mat-cell *matCellDef="let item">
          {{ item.amount | currency:'BRL' }}
        </td>

      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns">
      </tr>

      <tr
        mat-row
        *matRowDef="
          let row;
          columns: displayedColumns
        ">
      </tr>

    </table>
  }

</mat-dialog-content>
