<table
  mat-table
  [dataSource]="agreements"
>
  <ng-container matColumnDef="number">

    <th mat-header-cell *matHeaderCellDef>
      Acordo
    </th>

    <td mat-cell *matCellDef="let item">
      {{ item.number }}
    </td>

  </ng-container>

  <ng-container matColumnDef="contractNumber">

    <th mat-header-cell *matHeaderCellDef>
      Contrato
    </th>

    <td mat-cell *matCellDef="let item">
      {{ item.contractNumber }}
    </td>

  </ng-container>

  <ng-container matColumnDef="dueDate">

    <th mat-header-cell *matHeaderCellDef>
      Vencimento
    </th>

    <td mat-cell *matCellDef="let item">
      {{ item.dueDate | date:'dd/MM/yyyy' }}
    </td>

  </ng-container>

  <ng-container matColumnDef="amount">

    <th mat-header-cell *matHeaderCellDef>
      Valor
    </th>

    <td mat-cell *matCellDef="let item">
      {{ item.amount | currency:'BRL' }}
    </td>

  </ng-container>

  <ng-container matColumnDef="totalInstallments">

    <th mat-header-cell *matHeaderCellDef>
      Parcelas
    </th>

    <td mat-cell *matCellDef="let item">
      {{ item.totalInstallments }}
    </td>

  </ng-container>
  <ng-container matColumnDef="actions">

    <th mat-header-cell *matHeaderCellDef>
      Ações
    </th>

    <td mat-cell *matCellDef="let item">

      <button
        mat-icon-button
        matTooltip="Visualizar acordo"
        (click)="viewAgreement(item)"
      >
        <mat-icon>
          visibility
        </mat-icon>
      </button>

    </td>

  </ng-container>
  <tr
    mat-header-row
    *matHeaderRowDef="displayedColumns">
  </tr>

  <tr
    mat-row
    *matRowDef="
      let row;
      columns: displayedColumns
    ">
  </tr>

</table>
