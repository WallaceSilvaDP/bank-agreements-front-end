<div class="table-container">

  <table mat-table [dataSource]="contracts" class="mat-elevation-z8">

    <ng-container matColumnDef="contractNumber">
      <th mat-header-cell *matHeaderCellDef>
        Contrato
      </th>

      <td mat-cell *matCellDef="let item">
        {{ item.contractNumber }}
      </td>
    </ng-container>

    <ng-container matColumnDef="debtorName">
      <th mat-header-cell *matHeaderCellDef>
        Cliente
      </th>

      <td mat-cell *matCellDef="let item">
        {{ item.debtorName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="institutionName">
      <th mat-header-cell *matHeaderCellDef>
        Instituição
      </th>

      <td mat-cell *matCellDef="let item">
        {{ item.institutionName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="contractAmount">
      <th mat-header-cell *matHeaderCellDef>
        Valor Contrato
      </th>

      <td mat-cell *matCellDef="let item">
        {{ item.contractAmount | currency:'BRL' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="debtAmount">
      <th mat-header-cell *matHeaderCellDef>
        Dívida
      </th>

      <td mat-cell *matCellDef="let item">
        {{ item.debtAmount | currency:'BRL' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>
        Ações
      </th>

      <td mat-cell *matCellDef="let element">

        <button mat-icon-button>
          <mat-icon>visibility</mat-icon>
        </button>

        <button
          mat-icon-button
          matTooltip="Gerar acordo"
          (click)="openAgreementModal(element)"
        >
          <mat-icon>handshake</mat-icon>
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
