<app-page-header

/>

<mat-card class="filter-card">

  <mat-card-content>

    <div class="filters">

      <mat-form-field appearance="outline">
        <mat-label>CPF</mat-label>
        <input matInput />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Cliente</mat-label>
        <input matInput />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Contrato</mat-label>
        <input matInput />
      </mat-form-field>

      <button mat-flat-button>
        Buscar

    </div>

  </mat-card-content>

</mat-card>

<app-contract-table />
